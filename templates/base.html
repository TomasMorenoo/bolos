<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bowling Tracker{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1, h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        /* --- ESTILOS DEL NUEVO NAVBAR --- */
        nav {
            background: #667eea;
            padding: 0 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-brand {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
        }
        
        nav a.nav-item {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        
        nav a.nav-item:hover {
            background: rgba(255,255,255,0.1);
            border-bottom: 3px solid #fff;
        }
        /* -------------------------------- */
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button, .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        button:hover, .btn:hover {
            background: #5568d3;
        }
        
        .list-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .list-item:hover {
            background: #e9ecef;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            nav {
                flex-wrap: wrap;
                padding: 10px 15px;
                gap: 5px;
            }

            .nav-brand {
                font-size: 17px;
            }

            .nav-links {
                width: 100%;
                justify-content: space-around;
                border-top: 1px solid rgba(255,255,255,0.2);
                padding-top: 5px;
                margin-top: 5px;
            }

            nav a.nav-item {
                padding: 8px 10px;
                font-size: 13px;
                flex-direction: column;
                gap: 4px;
                text-align: center;
                border-bottom: none;
            }

            nav a.nav-item:hover {
                border-bottom: none;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <nav>
            <a href="/" class="nav-brand">
                <i class="fa-solid fa-bowling-ball"></i> StrikeApp
            </a>
            <div class="nav-links">
                <a href="/" class="nav-item"><i class="fa-solid fa-house"></i> Inicio</a>
                <a href="/players" class="nav-item"><i class="fa-solid fa-users"></i> Jugadores</a>
                <a href="/outings" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Salidas</a>
                <a href="/stats" class="nav-item"><i class="fa-solid fa-chart-simple"></i> Stats</a>
            </div>
        </nav>
        {% block content %}{% endblock %}
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado con éxito', registration.scope);
                    })
                    .catch(err => {
                        console.log('Fallo al registrar el ServiceWorker', err);
                    });
            });
        }
    </script>
</body>
</html>
